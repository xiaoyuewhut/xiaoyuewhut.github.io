          <h1>把车辆系统写清楚</h1>
          <p class="post-intro">
            技术博客最容易出的问题，不是公式少，而是叙事不稳。读者不知道问题从哪来，也不知道结论为什么可信。
          </p>
          <p>
            写车辆动力学、控制和自动驾驶，不应该只是摘录结论。更好的写法是从系统边界开始，说明输入是什么、约束是什么、目标是什么、近似条件是什么。
          </p>
          <p>
            当文章按系统的结构展开，公式就不再像展示，而像证明。读者不仅知道“结果是什么”，还知道“为什么这个结果值得相信”。
          </p>
          <p>
            这个站点后续的文章，会尽量沿着这种方式写：先定义问题，再搭分析框架，最后给出结论与适用范围。
          </p>
        </article>
